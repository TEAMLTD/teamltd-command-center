<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAMLTD Command Center</title>
    <!-- Existing CSS remains the same -->
</head>
<body>
    <!-- Existing HTML remains the same -->

    <script>
        // Remove hardcoded tokens
        const AD_ACCOUNT_ID = ''; // Will be set via environment variable
        
        // Modify to fetch tokens from backend
        async function fetchMetrics() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('metrics').innerHTML = '';
                
                // Fetch metrics from Netlify function
                const response = await fetch('/.netlify/functions/meta-ads-insights', {
                    method: 'POST',
                    body: JSON.stringify({ dateRange: currentDateRange })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to fetch Meta Ads insights');
                }
                
                // Rest of the existing displayMetrics and displayFunnel logic remains the same
                displayMetrics(data.metrics);
                displayFunnel(data.funnel);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('lastUpdated').textContent = `Last updated: ${new Date().toLocaleString()}`;
                
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `Error loading data: ${error.message}`;
                console.error('Error:', error);
            }
        }
        
        // Existing other functions remain the same
    </script>
</body>
</html>
