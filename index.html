<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAMLTD Command Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            background: #1a1a1a;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .header-left {
            display: flex;
            align-items: center;
        }
        
        .logo {
            height: 50px;
            margin-right: 15px;
            filter: invert(1);
        }
        
        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 2px;
        }
        
        .date-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .date-btn {
            padding: 8px 12px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .date-btn:hover {
            background: #3a3a3a;
        }
        
        .date-btn.active {
            background: #0066ff;
            border-color: #0066ff;
        }
        
        @media (max-width: 768px) {
            .date-btn {
                padding: 6px 10px;
                font-size: 10px;
            }
            
            .header {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .date-filters {
                width: 100%;
                justify-content: center;
            }
            
            .funnel-label {
                min-width: 100px;
                font-size: 11px;
            }
            
            .funnel-value {
                font-size: 13px;
                min-width: 40px;
            }
        }
        
        .section {
            margin-bottom: 40px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .metric-card {
            background: #1a1a1a;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            transition: all 0.2s;
        }
        
        .metric-card:hover {
            border-color: #3a3a3a;
            transform: translateY(-2px);
        }
        
        .metric-card.positive {
            border-left: 3px solid #10b981;
        }
        
        .metric-card.negative {
            border-left: 3px solid #ef4444;
        }
        
        .metric-card.neutral {
            border-left: 3px solid #6366f1;
        }
        
        .metric-label {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .metric-value {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
        }
        
        .metric-subtext {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            background: #2a1a1a;
            color: #ef4444;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px solid #3a2a2a;
        }
        
        .funnel-section {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            margin-top: 30px;
        }
        
        .funnel-title {
            font-size: 14px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }
        
        .funnel-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .funnel-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .funnel-label {
            min-width: 150px;
            font-size: 13px;
            color: #ccc;
        }
        
        .funnel-bar-container {
            flex: 1;
            height: 24px;
            background: #0a0a0a;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        
        .funnel-bar {
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }
        
        .funnel-bar.views {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
        }
        
        .funnel-bar.cart {
            background: linear-gradient(90deg, #f59e0b, #d97706);
        }
        
        .funnel-bar.checkout {
            background: linear-gradient(90deg, #ef4444, #dc2626);
        }
        
        .funnel-bar.purchase {
            background: linear-gradient(90deg, #10b981, #059669);
        }
        
        .funnel-value {
            min-width: 50px;
            text-align: right;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }
        
        .last-updated {
            text-align: center;
            color: #666;
            font-size: 11px;
            margin-top: 20px;
        }
        
        .placeholder {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 12px;
            border: 2px dashed #2a2a2a;
            text-align: center;
            color: #666;
        }
        
        .placeholder-title {
            font-size: 18px;
            margin-bottom: 10px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <svg class="logo" viewBox="0 0 576 576" xmlns="http://www.w3.org/2000/svg">
                <polygon points="101.8 412.1 101.8 421.7 74.5 421.7 74.5 493.1 63.5 493.1 63.5 421.7 36.1 421.7 36.1 412.1 101.8 412.1"/>
                <polygon points="107.3 412.1 166.2 412.1 166.2 422 118 422 118 446.6 162.5 446.6 162.5 456 118 456 118 483.4 167 483.4 167 493.1 107.3 493.1 107.3 412.1"/>

                <polygon points="444.5 411.8 444.5 426.2 420.1 426.2 420.1 493.1 403 493.1 403 426.2 378.6 426.2 378.6 411.8 444.5 411.8"/>
                <path d="M465.2,425.9v53.1h15.7c8,0,13.6-4,16.8-11.9,1.7-4.3,2.6-9.5,2.6-15.5s-1.3-14.6-3.9-19.1c-2.6-4.4-7.8-6.7-15.5-6.7h-15.7ZM496.4,413.5c5.7,1.9,10.3,5.3,13.9,10.3,2.8,4.1,4.8,8.4,5.8,13.1,1,4.7,1.6,9.2,1.6,13.5,0,10.8-2.2,20-6.5,27.5-5.9,10.1-15,15.2-27.3,15.2h-35.1v-81.3h35.1c5,0,9.2.7,12.6,1.8"/>

                <path style="fill-rule:evenodd" d="M523,476.8h17.1v16.5h-17.2v-16.4s0,0,0,0ZM531.8,479.2h0c-.2.3-.3.6-.6,1.1-.1.2-.4.9-.6,1-.1,0-.4-.2-.6-.3-.2-.1-.4-.2-.6-.3.2.8.4,1.7.5,2.6,0,.3.2.7,0,.8-.2,0-.7-.6-.8-.7-.3-.3-.5-.5-.8-.8-.2.3-.2.7-.5.8-.5.2-1.2-.3-1.6-.3,0,.7.4,1.2.4,1.9-.1.2-.4.2-.6.3.8,1,3.3,1.5,2.5,3.5.7,0,1.6-.2,2.3-.3.2,0,.6-.1.7,0,0,1,0,1.9-.1,2.8.1,0,.5,0,.6,0,0-.9-.1-2-.1-2.8.4-.2,1,0,1.5,0,.5,0,1,.2,1.5.2-.1-.3-.3-.8-.1-1.2.4-1.1,2-1.5,2.7-2.3-1.3,0-.2-1.5-.2-2.3-.5,0-1.2.6-1.7.3-.2-.1-.2-.5-.4-.8-.2.2-.5.4-.8.8-.2.2-.5.8-.8.8-.3,0,0-.6,0-.8.2-.9.4-1.7.5-2.5-.4,0-.8.5-1.2.6-.4-.6-.7-1.4-1.1-2Z"/>
            </svg>
            <div class="header-title">COMMAND CENTER</div>
        </div>
        <div class="date-filters">
            <button class="date-btn" onclick="setDateRange('yesterday')">YESTERDAY</button>
            <button class="date-btn active" onclick="setDateRange('last_7d')">LAST 7 DAYS</button>
            <button class="date-btn" onclick="setDateRange('last_30d')">LAST 30 DAYS</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Meta Ads</div>
        <div id="loading" class="loading">Loading data...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="metrics" class="metrics-grid"></div>
        
        <div class="funnel-section">
            <h3 class="funnel-title">CONVERSION FUNNEL</h3>
            <div id="funnel" class="funnel-container"></div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Shopify</div>
        <div class="placeholder">
            <div class="placeholder-title">Coming Soon</div>
            <div>Shopify integration will display here</div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Instagram</div>
        <div class="placeholder">
            <div class="placeholder-title">Coming Soon</div>
            <div>Instagram insights will display here</div>
        </div>
    </div>

    <div class="last-updated" id="lastUpdated"></div>

    <script>
        const ACCESS_TOKEN = 'EAF2AWCxmUJoBQ41zAtKdpRh0XuFUpRyMtzAoT4iAoyhaIQqgNAX7F8sJBpwXFeHNJoqZBZCkvSyMOLuk43OgVPjwRB1OS8UlOwNGb1qdhoucoBTmSWwcKfhPNCdK0SXbGYrmFvxmVUWZAB1al4cyK7BhN7ZAOYSNWxDxaQ4nFGl3aWULDzEX0RZCxR0UoP8o84UwFDVQcJHcAmCtiw9ZCLbx6FJJONBxSBtRFH3CNUZAv2SI880wDX78Vzu4xgwxy57uhFOTUDX8ZCMxtbuqrlYQOAZDZD';
        const AD_ACCOUNT_ID = 'act_23302665';
        let currentDateRange = 'last_7d';
        
        function setDateRange(range) {
            currentDateRange = range;
            
            // Update button states
            document.querySelectorAll('.date-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Reload data
            fetchMetrics();
        }
        
        function displayMetrics(data) {
            const metricsContainer = document.getElementById('metrics');
            
            const metrics = [
                { label: 'Website Purchases', value: data.purchases, type: 'positive' },
                { label: 'Revenue', value: `$${data.revenue}`, type: 'positive' },
                { label: 'Spend', value: `$${data.spend}`, type: 'negative' },
                { label: 'ROAS', value: data.roas + 'x', type: 'positive' },
                { label: 'Link Clicks', value: data.linkClicks, type: 'neutral' },
                { label: 'CTR', value: data.ctr + '%', type: 'neutral' },
                { label: 'CPM', value: `$${data.cpm}`, type: 'neutral' },
                { label: 'CPC', value: `$${data.cpc}`, type: 'neutral' },
                { label: 'Impressions', value: data.impressions, type: 'neutral' }
            ];
            
            metricsContainer.innerHTML = metrics.map(metric => `
                <div class="metric-card ${metric.type}">
                    <div class="metric-label">${metric.label}</div>
                    <div class="metric-value">${metric.value}</div>
                    <div class="metric-subtext">${currentDateRange === 'yesterday' ? 'Yesterday' : currentDateRange === 'last_7d' ? 'Last 7 days' : 'Last 30 days'}</div>
                </div>
            `).join('');
        }
        
        function displayFunnel(data) {
            const funnelContainer = document.getElementById('funnel');
            
            // Find max value for scaling bars
            const maxValue = Math.max(data.landingPageViews, data.addToCart, data.initiateCheckout, data.purchases);
            
            const funnelSteps = [
                { label: 'Landing Page Views', value: data.landingPageViews, type: 'views' },
                { label: 'Add to Cart', value: data.addToCart, type: 'cart' },
                { label: 'Initiated Checkout', value: data.initiateCheckout, type: 'checkout' },
                { label: 'Purchases', value: data.purchases, type: 'purchase' }
            ];
            
            funnelContainer.innerHTML = funnelSteps.map(step => {
                const percentage = maxValue > 0 ? (step.value / maxValue) * 100 : 0;
                return `
                    <div class="funnel-row">
                        <div class="funnel-label">${step.label}</div>
                        <div class="funnel-bar-container">
                            <div class="funnel-bar ${step.type}" style="width: ${percentage}%"></div>
                        </div>
                        <div class="funnel-value">${step.value.toLocaleString()}</div>
                    </div>
                `;
            }).join('');
        }
        
        async function fetchMetrics() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('metrics').innerHTML = '';
                
                // Fetch insights from Meta Ads API
                const url = `https://graph.facebook.com/v21.0/${AD_ACCOUNT_ID}/insights?access_token=${ACCESS_TOKEN}&date_preset=${currentDateRange}&fields=spend,purchase_roas,impressions,clicks,ctr,cpm,cpc,actions,action_values&level=account`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }
                
                if (!data.data || data.data.length === 0) {
                    throw new Error('No data available for the selected period');
                }
                
                const insights = data.data[0];
                
                // Extract purchase data
                const purchases = insights.actions?.find(a => a.action_type === 'purchase' || a.action_type === 'offsite_conversion.fb_pixel_purchase')?.value || 0;
                const revenue = insights.action_values?.find(a => a.action_type === 'purchase' || a.action_type === 'offsite_conversion.fb_pixel_purchase')?.value || 0;
                
                // Extract link clicks
                const linkClicks = insights.actions?.find(a => a.action_type === 'link_click')?.value || 0;
                
                // Extract funnel data
                const landingPageViews = insights.actions?.find(a => a.action_type === 'landing_page_view')?.value || 0;
                const addToCart = insights.actions?.find(a => a.action_type === 'add_to_cart' || a.action_type === 'offsite_conversion.fb_pixel_add_to_cart')?.value || 0;
                const initiateCheckout = insights.actions?.find(a => a.action_type === 'initiate_checkout' || a.action_type === 'offsite_conversion.fb_pixel_initiate_checkout')?.value || 0;
                
                // Calculate ROAS
                const spend = parseFloat(insights.spend || 0);
                const roas = spend > 0 ? (parseFloat(revenue) / spend).toFixed(2) : '0.00';
                
                // Display metrics
                displayMetrics({
                    purchases: parseInt(purchases).toLocaleString(),
                    revenue: parseFloat(revenue).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}),
                    spend: spend.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}),
                    roas: roas,
                    linkClicks: parseInt(linkClicks).toLocaleString(),
                    ctr: parseFloat(insights.ctr || 0).toFixed(2),
                    cpm: parseFloat(insights.cpm || 0).toFixed(2),
                    cpc: parseFloat(insights.cpc || 0).toFixed(2),
                    impressions: parseInt(insights.impressions || 0).toLocaleString()
                });
                
                // Display funnel
                displayFunnel({
                    landingPageViews: parseInt(landingPageViews),
                    addToCart: parseInt(addToCart),
                    initiateCheckout: parseInt(initiateCheckout),
                    purchases: parseInt(purchases)
                });
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('lastUpdated').textContent = `Last updated: ${new Date().toLocaleString()}`;
                
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `Error loading data: ${error.message}`;
                console.error('Error:', error);
            }
        }
        
        // Load data on page load
        fetchMetrics();
        
        // Refresh every 5 minutes
        setInterval(fetchMetrics, 5 * 60 * 1000);
    </script>
</body>
</html>
