[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "."

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  GA_PROPERTY_ID = "333133275"
  META_ADS_ACCOUNT_ID = "act_23302665"
  SHOPIFY_SHOP_DOMAIN = "teamltd.myshopify.com"

[plugins]
  [[plugins.inputs]]
    package = "@netlify/plugin-functions-core"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
