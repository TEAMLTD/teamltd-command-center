[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "."

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  GA_PROPERTY_ID = "333133275"

[context.deploy-preview.environment]
  GA_PROPERTY_ID = "333133275"

[context.branch-deploy.environment]
  GA_PROPERTY_ID = "333133275"
